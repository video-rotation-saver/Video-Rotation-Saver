# Video Rotation Saver config.
# Location at runtime: %APPDATA%\VideoRotationSaver\config.ini
# The real file is created with defaults on first run.

[potplayer]
# Full path to PotPlayerMini64.exe. Leave blank to auto-detect.
potplayer_path =

[ffmpeg]
# Either a full path or a bare name that's on PATH.
ffmpeg_path = ffmpeg
ffprobe_path = ffprobe
# Unused in v1; kept so a future "write Matroska tag anyway" mode can opt in.
mkvpropedit_path = mkvpropedit

[safety]
# One of: keep_until_next_run | keep_forever | delete_immediately
# "keep_until_next_run" keeps the .bak around for this session so you can
# undo a mistake, and sweeps it on the next rotation.
backup_behavior = keep_until_next_run

[ui]
# Reserved for future UI placement options.
# auto | center_potplayer | bottom_right | cursor
popup_position = auto

# Hotkeys — human-readable format. The daemon binds these via RegisterHotKey
# (system-global) but only FIRES when a PotPlayer window has foreground
# focus; otherwise it silently no-ops.
#
# Format: zero or more modifiers + one key, separated by '+'.
#   modifiers: ctrl | shift | alt | win
#   keys:      A-Z, 0-9, F1-F24, space, tab, esc, enter, left, right, up,
#              down, home, end, pgup, pgdn, insert, delete, backspace,
#              numpad 0-9 (or num0..num9), numpad +/-/*///.
#
# NOTE: bare-key hotkeys (no modifier) like "numpad 2" still consume the
# key globally while the daemon is running — if you type "2" on the
# numpad in another app, that other app won't see it. Use a modifier
# combo (e.g. "ctrl+alt+numpad 2") if that matters to you.
rotation_hotkey = ctrl+alt+numpad 2
rename_hotkey   = ctrl+alt+numpad 4

[meta]
default_hotkey_note = Hotkeys are bound by this daemon, not by PotPlayer itself.
